<script>
  // Polyfill Claude's artifact-only window.storage API using plain localStorage,
  // so the rest of the app code doesn't need to change.
  window.storage = {
    async get(key) {
      const v = localStorage.getItem(key);
      if (v === null) return null;
      return { key, value: v };
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return { key, value };
    },
    async delete(key) {
      const existed = localStorage.getItem(key) !== null;
      localStorage.removeItem(key);
      return { key, deleted: existed };
    },
    async list(prefix) {
      const keys = Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix));
      return { keys };
    },
  };
</script>

const WEEKDAYS = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];

const GLOBAL_CSS = `

@keyframes ledgerSlideUp { from { transform: translateY(100%);} to { transform: translateY(0);} }

function todayLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function formatMoney(amount, code) {
  const n = Number(amount) || 0;
  const symbol = CURRENCIES.find((c) => c.code === code)?.symbol || "";
  const decimals = code === "USD" ? 2 : 0;
  const formatted = n.toLocaleString("en-US", {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
  return `${symbol}${formatted}`;
}

function formatDateLabel(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return `${m}/${d} ${WEEKDAYS[dt.getDay()]}`;
}

function groupExpensesByDate(expenses) {
  const map = {};
  expenses.forEach((e) => {
    if (!map[e.date]) map[e.date] = [];
    map[e.date].push(e);
  });
  const keys = Object.keys(map).sort((a, b) => (a < b ? 1 : -1));
  keys.forEach((k) => map[k].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
  return { map, keys };
}

function getRangeForPreset(preset) {
  const today = todayLocal();
  if (preset === "today") return { from: today, to: today };
  if (preset === "week") {
    const d = new Date();
    const day = d.getDay();
    const diffToMonday = day === 0 ? 6 : day - 1;
    const monday = new Date(d);
    monday.setDate(d.getDate() - diffToMonday);
    const from = `${monday.getFullYear()}-${String(monday.getMonth() + 1).padStart(2, "0")}-${String(monday.getDate()).padStart(2, "0")}`;
    return { from, to: today };
  }
  if (preset === "month") {
    const d = new Date();
    const from = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-01`;
    return { from, to: today };
  }
  return { from: "", to: "" };
}

const defaultData = () => ({
  trips: [{ id: uid(), name: "宜蘭兩日遊", currency: "TWD", budget: 0, exchangeRate: 0, createdAt: Date.now() }],
  expenses: [],
});

function ExpenseTracker() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saveError, setSaveError] = useState(false);
  const [activeTripId, setActiveTripId] = useState(null);

  const [showAddTrip, setShowAddTrip] = useState(false);
  const [editingTripId, setEditingTripId] = useState(null);
  const [newTripName, setNewTripName] = useState("");
  const [newTripCurrency, setNewTripCurrency] = useState("TWD");
  const [newTripBudget, setNewTripBudget] = useState("");
  const [newTripExchangeRate, setNewTripExchangeRate] = useState("");

  const [showAddExpense, setShowAddExpense] = useState(false);
  const [formAmount, setFormAmount] = useState("");
  const [formCategory, setFormCategory] = useState("food");
  const [formNote, setFormNote] = useState("");
  const [formDate, setFormDate] = useState(todayLocal());

  const [confirmDeleteExpense, setConfirmDeleteExpense] = useState(null);
  const [confirmDeleteTrip, setConfirmDeleteTrip] = useState(false);
  const [shareToast, setShareToast] = useState(false);

  const [showSearch, setShowSearch] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const [searchPreset, setSearchPreset] = useState("all");
  const [searchDateFrom, setSearchDateFrom] = useState("");
  const [searchDateTo, setSearchDateTo] = useState("");
  const [searchScope, setSearchScope] = useState("current");
  const [searchCategories, setSearchCategories] = useState(() => new Set());

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY);
        const parsed = res ? JSON.parse(res.value) : defaultData();
        setData(parsed);
        setActiveTripId(parsed.trips[0]?.id || null);
      } catch (e) {
        const fresh = defaultData();
        setData(fresh);
        setActiveTripId(fresh.trips[0]?.id || null);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  useEffect(() => {
    setConfirmDeleteTrip(false);
    setConfirmDeleteExpense(null);
  }, [activeTripId]);

  const persist = useCallback(async (next) => {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(next));
      setSaveError(false);
    } catch (e) {
      setSaveError(true);
    }
  }, []);

  const updateData = (updater) => {
    setData((prev) => {
      const next = updater(prev);
      persist(next);
      return next;
    });
  };

  if (loading || !data) {
    return (
      <div style={styles.loadingWrap}>
        <IconWallet size={32} color="#D4AF37" />
        <div style={{ marginTop: 12, color: "#9AA0A6", fontSize: 16 }}>載入中...</div>
      </div>
    );
  }

  const activeTrip = data.trips.find((t) => t.id === activeTripId) || data.trips[0];
  const tripExpenses = data.expenses.filter((e) => e.tripId === activeTrip?.id);
  const total = tripExpenses.reduce((s, e) => s + Number(e.amount), 0);

  const budget = activeTrip?.budget || 0;
  const hasBudget = budget > 0;
  const budgetPct = hasBudget ? Math.round((total / budget) * 100) : 0;
  const budgetColor = budgetPct >= 100 ? "#E5484D" : budgetPct >= 80 ? "#D4AF37" : "#6FCF97";

  const exchangeRate = activeTrip?.exchangeRate || 0;
  const showConversion = activeTrip && activeTrip.currency !== "TWD" && exchangeRate > 0;

  const categoryTotals = CATEGORIES.map((c) => ({
    ...c,
    total: tripExpenses.filter((e) => e.category === c.id).reduce((s, e) => s + Number(e.amount), 0),
  }))
    .filter((c) => c.total > 0)
    .sort((a, b) => b.total - a.total);

  const { map: groupsMap, keys: dateKeys } = groupExpensesByDate(tripExpenses);
  const trendDates = [...dateKeys].reverse();
  const trendMax = Math.max(1, ...trendDates.map((d) => groupsMap[d].reduce((s, e) => s + Number(e.amount), 0)));

  const tripCurrencyMap = {};
  const tripNameMap = {};
  data.trips.forEach((t) => {
    tripCurrencyMap[t.id] = t.currency;
    tripNameMap[t.id] = t.name;
  });

  const searchPool = searchScope === "all" ? data.expenses : tripExpenses;
  const searchQ = searchQuery.trim().toLowerCase();
  const searchResultsList = searchPool.filter((e) => {
    if (searchCategories.size > 0 && !searchCategories.has(e.category)) return false;
    if (searchDateFrom && e.date < searchDateFrom) return false;
    if (searchDateTo && e.date > searchDateTo) return false;
    if (searchQ) {
      const catLabel = (CATEGORIES.find((c) => c.id === e.category) || {}).label || "";
      const hay = (e.note + " " + catLabel).toLowerCase();
      if (!hay.includes(searchQ)) return false;
    }
    return true;
  });
  const { map: searchGroupMap, keys: searchDateKeys } = groupExpensesByDate(searchResultsList);
  let resultsSummaryText = null;
  if (searchResultsList.length > 0) {
    if (searchScope === "current") {
      const sum = searchResultsList.reduce((s, e) => s + Number(e.amount), 0);
      resultsSummaryText = `${searchResultsList.length} 筆・${formatMoney(sum, activeTrip.currency)}`;
    } else {
      resultsSummaryText = `${searchResultsList.length} 筆`;
    }
  }

  function openAddTripModal() {
    setEditingTripId(null);
    setNewTripName("");
    setNewTripCurrency("TWD");
    setNewTripBudget("");
    setNewTripExchangeRate("");
    setShowAddTrip(true);
  }

  function openEditTripModal(trip) {
    setEditingTripId(trip.id);
    setNewTripName(trip.name);
    setNewTripCurrency(trip.currency);
    setNewTripBudget(trip.budget ? String(trip.budget) : "");
    setNewTripExchangeRate(trip.exchangeRate ? String(trip.exchangeRate) : "");
    setShowAddTrip(true);
  }

  function closeTripModal() {
    setShowAddTrip(false);
    setEditingTripId(null);
  }

  function saveTrip() {
    const name = newTripName.trim();
    if (!name) return;
    const b = parseFloat(newTripBudget) || 0;
    const rate = parseFloat(newTripExchangeRate) || 0;
    if (editingTripId) {
      updateData((prev) => ({
        ...prev,
        trips: prev.trips.map((t) => (t.id === editingTripId ? { ...t, name, budget: b, exchangeRate: rate } : t)),
      }));
    } else {
      const trip = { id: uid(), name, currency: newTripCurrency, budget: b, exchangeRate: rate, createdAt: Date.now() };
      updateData((prev) => ({ ...prev, trips: [...prev.trips, trip] }));
      setActiveTripId(trip.id);
    }
    closeTripModal();
  }

  function deleteTrip() {
    if (data.trips.length <= 1) return;
    const remaining = data.trips.filter((t) => t.id !== activeTrip.id);
    updateData((prev) => ({
      trips: remaining,
      expenses: prev.expenses.filter((e) => e.tripId !== activeTrip.id),
    }));
    setActiveTripId(remaining[0]?.id || null);
    setConfirmDeleteTrip(false);
  }

  function addExpense() {
    const amt = parseFloat(formAmount);
    if (!amt || amt <= 0 || !activeTrip) return;
    const expense = {
      id: uid(),
      tripId: activeTrip.id,
      amount: amt,
      category: formCategory,
      note: formNote.trim(),
      date: formDate,
      createdAt: Date.now(),
    };
    updateData((prev) => ({ ...prev, expenses: [...prev.expenses, expense] }));
    setFormAmount("");
    setFormNote("");
    setFormCategory("food");
    setFormDate(todayLocal());
    setShowAddExpense(false);
  }

  function deleteExpense(id) {
    updateData((prev) => ({ ...prev, expenses: prev.expenses.filter((e) => e.id !== id) }));
    setConfirmDeleteExpense(null);
  }

  function applyPreset(preset) {
    setSearchPreset(preset);
    if (preset === "all") {
      setSearchDateFrom("");
      setSearchDateTo("");
    } else if (preset !== "custom") {
      const range = getRangeForPreset(preset);
      setSearchDateFrom(range.from);
      setSearchDateTo(range.to);
    }
  }

  function toggleSearchCategory(id) {
    setSearchCategories((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  }

  function clearSearchFilters() {
    setSearchQuery("");
    setSearchPreset("all");
    setSearchDateFrom("");
    setSearchDateTo("");
    setSearchScope("current");
    setSearchCategories(new Set());
  }

  function buildSummaryText() {
    const lines = [];
    lines.push(`${activeTrip.name} 支出總結`);
    lines.push(`總額：${formatMoney(total, activeTrip.currency)}${hasBudget ? `／預算 ${formatMoney(budget, activeTrip.currency)}` : ""}`);
    if (showConversion) lines.push(`約合台幣：${formatMoney(total * exchangeRate, "TWD")}`);
    if (categoryTotals.length > 0) {
      lines.push("——");
      categoryTotals.forEach((c) => {
        const pct = total > 0 ? Math.round((c.total / total) * 100) : 0;
        lines.push(`${c.label}：${formatMoney(c.total, activeTrip.currency)}（${pct}%）`);
      });
    }
    if (dateKeys.length > 0) {
      lines.push("——");
      [...dateKeys].reverse().forEach((d) => {
        const sum = groupsMap[d].reduce((s, e) => s + Number(e.amount), 0);
        lines.push(`${formatDateLabel(d)}：${formatMoney(sum, activeTrip.currency)}`);
      });
    }
    return lines.join("\n");
  }

  async function handleShare() {
    const text = buildSummaryText();
    try {
      await navigator.clipboard.writeText(text);
      setShareToast("ok");
    } catch (e) {
      setShareToast("error");
    }
    setTimeout(() => setShareToast(false), 2000);
  }

  function renderExpenseRow(e, opts = {}) {
    const cat = CATEGORIES.find((c) => c.id === e.category) || CATEGORIES[5];
    const Icon = cat.icon;
    const isConfirming = confirmDeleteExpense === e.id;
    const currency = opts.currency || activeTrip.currency;
    const subParts = [];
    if (opts.tripName) subParts.push(opts.tripName);
    if (e.note) subParts.push(cat.label);
    const subText = subParts.join(" · ");

    return (
      <div key={e.id} style={styles.expenseRow}>
        {isConfirming ? (
          <div style={styles.rowConfirmWrap}>
            <span style={styles.confirmText}>刪除這筆紀錄?</span>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="lg-press" style={styles.confirmDangerBtn} onClick={() => deleteExpense(e.id)}>刪除</button>
              <button className="lg-press" style={styles.confirmCancelBtn} onClick={() => setConfirmDeleteExpense(null)}>取消</button>
            </div>
          </div>
        ) : (
          <>
            <div style={{ ...styles.categoryIconBox, backgroundColor: cat.color + "22" }}>
              <Icon size={18} color={cat.color} />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={styles.expenseNote}>{e.note || cat.label}</div>
              {subText && <div style={styles.expenseCatLabel}>{subText}</div>}
            </div>
            <div style={styles.expenseAmount}>{formatMoney(e.amount, currency)}</div>
            <button
              className="lg-press"
              style={styles.rowDeleteBtn}
              onClick={() => setConfirmDeleteExpense(e.id)}
              aria-label="刪除"
            >
              <IconTrash size={15} color="#6B7076" />
            </button>
          </>
        )}
      </div>
    );
  }

  return (
    <div style={styles.page}>
      <style>{GLOBAL_CSS}</style>

      {shareToast && (
        <div style={styles.toast}>{shareToast === "error" ? "複製失敗，請手動複製" : "已複製到剪貼簿 ✓"}</div>
      )}

      <div style={styles.container}>
        <div style={styles.header}>
          <div style={styles.headerLeft}>
            <div style={styles.logoBox}>
              <IconWallet size={20} color="#0B0D10" />
            </div>
            <span style={styles.headerTitle}>旅費帳</span>
          </div>
          <button className="lg-press" style={styles.searchBtn} onClick={() => setShowSearch(true)} aria-label="搜尋">
            <IconSearch size={18} color="#D4AF37" />
          </button>
        </div>

        {saveError && (
          <div style={styles.errorBanner}>
            <IconAlert size={16} color="#E5484D" />
            <span>尚未同步儲存，請檢查瀏覽器儲存空間</span>
          </div>
        )}

        <div className="lg-tabs" style={styles.tabsRow}>
          {data.trips.map((t) => (
            <button
              key={t.id}
              className="lg-press"
              onClick={() => setActiveTripId(t.id)}
              style={{
                ...styles.tripTag,
                ...(t.id === activeTrip?.id ? styles.tripTagActive : {}),
              }}
            >
              <span style={styles.tripTagHole} />
              <span style={styles.tripTagName}>{t.name}</span>
              <span style={styles.tripTagCurrency}>{t.currency}</span>
            </button>
          ))}
          <button className="lg-press" style={styles.addTripBtn} onClick={openAddTripModal}>
            <IconPlus size={18} color="#D4AF37" />
          </button>
        </div>

        {activeTrip && (
          <div key={activeTrip.id} style={{ animation: "ledgerFadeIn .25s ease-out" }}>
            <div style={styles.summaryCard}>
              <div style={styles.summaryGlow} />
              <div style={styles.summaryTop}>
                <div>
                  <div style={styles.summaryTripName}>{activeTrip.name}</div>
                  <div style={styles.summaryEyebrow}>支出總額</div>
                  <div style={styles.summaryTotal}>{formatMoney(total, activeTrip.currency)}</div>
                  {showConversion && (
                    <div style={styles.summaryConvert}>≈ {formatMoney(total * exchangeRate, "TWD")}</div>
                  )}
                  <div style={styles.summarySub}>{tripExpenses.length} 筆紀錄</div>
                </div>
                <div style={{ display: "flex", gap: 6, position: "relative" }}>
                  <button className="lg-press" style={styles.iconSmallBtn} onClick={() => openEditTripModal(activeTrip)} aria-label="編輯行程">
                    <IconEdit size={14} color="#6B7076" />
                  </button>
                  <button className="lg-press" style={styles.iconSmallBtn} onClick={handleShare} aria-label="複製摘要">
                    <IconCopy size={14} color="#6B7076" />
                  </button>
                  <button className="lg-press" style={styles.iconSmallBtn} onClick={() => setConfirmDeleteTrip(true)} aria-label="刪除行程">
                    <IconTrash size={14} color="#6B7076" />
                  </button>
                </div>
              </div>

              {hasBudget && (
                <div style={styles.budgetBlock}>
                  <div style={styles.budgetRow}>
                    <span style={styles.budgetLabel}>預算 {formatMoney(budget, activeTrip.currency)}</span>
                    <span style={{ ...styles.budgetPct, color: budgetColor }}>{budgetPct}%</span>
                  </div>
                  <div style={styles.barTrack}>
                    <div style={{ ...styles.barFill, width: `${Math.min(budgetPct, 100)}%`, backgroundColor: budgetColor }} />
                  </div>
                  {budgetPct >= 100 && (
                    <div style={styles.budgetOverText}>超出預算 {formatMoney(total - budget, activeTrip.currency)}</div>
                  )}
                </div>
              )}

              {confirmDeleteTrip && (
                <div style={styles.confirmRow}>
                  <span style={styles.confirmText}>
                    {data.trips.length <= 1 ? "至少要保留一個行程" : `確定刪除「${activeTrip.name}」及其所有紀錄?`}
                  </span>
                  <div style={{ display: "flex", gap: 8 }}>
                    {data.trips.length > 1 && (
                      <button className="lg-press" style={styles.confirmDangerBtn} onClick={deleteTrip}>刪除</button>
                    )}
                    <button className="lg-press" style={styles.confirmCancelBtn} onClick={() => setConfirmDeleteTrip(false)}>取消</button>
                  </div>
                </div>
              )}
            </div>

            {categoryTotals.length > 0 && (
              <div style={styles.card}>
                <div style={styles.cardTitle}>分類統計</div>
                {categoryTotals.map((c) => {
                  const Icon = c.icon;
                  const pct = total > 0 ? Math.round((c.total / total) * 100) : 0;
                  return (
                    <div key={c.id} style={styles.categoryRow}>
                      <div style={{ ...styles.categoryIconBox, backgroundColor: c.color + "22" }}>
                        <Icon size={16} color={c.color} />
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={styles.categoryRowTop}>
                          <span style={styles.categoryName}>{c.label}</span>
                          <span style={styles.categoryAmount}>{formatMoney(c.total, activeTrip.currency)}</span>
                        </div>
                        <div style={styles.barTrack}>
                          <div style={{ ...styles.barFill, width: `${pct}%`, backgroundColor: c.color }} />
                        </div>
                      </div>
                      <span style={styles.categoryPct}>{pct}%</span>
                    </div>
                  );
                })}
              </div>
            )}

            {trendDates.length > 1 && (
              <div style={styles.card}>
                <div style={styles.cardTitle}>花費趨勢</div>
                <div className="lg-tabs" style={styles.trendScroll}>
                  {trendDates.map((d) => {
                    const sum = groupsMap[d].reduce((s, e) => s + Number(e.amount), 0);
                    const h = Math.max(6, Math.round((sum / trendMax) * 90));
                    return (
                      <div key={d} style={styles.trendBarWrap}>
                        <div style={styles.trendBarTrack}>
                          <div style={{ ...styles.trendBar, height: `${h}px` }} />
                        </div>
                        <div style={styles.trendBarLabel}>{formatDateLabel(d).split(" ")[0]}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            <div style={styles.listSection}>
              <div style={styles.cardTitle}>支出紀錄</div>
              {dateKeys.length === 0 && (
                <div style={styles.emptyState}>
                  <IconCalendar size={28} color="#4A4F55" />
                  <div style={styles.emptyText}>還沒有支出紀錄</div>
                  <div style={styles.emptySub}>點右下角「＋」開始記帳</div>
                </div>
              )}
              {dateKeys.map((dateKey) => {
                const dayExpenses = groupsMap[dateKey];
                const daySum = dayExpenses.reduce((s, e) => s + Number(e.amount), 0);
                return (
                  <div key={dateKey} style={{ marginBottom: 16 }}>
                    <div style={styles.dateHeader}>
                      <span>{formatDateLabel(dateKey)}</span>
                      <span style={styles.dateHeaderSum}>{formatMoney(daySum, activeTrip.currency)}</span>
                    </div>
                    {dayExpenses.map((e) => renderExpenseRow(e))}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {activeTrip && (
        <button className="lg-press" style={styles.fab} onClick={() => setShowAddExpense(true)} aria-label="新增支出">
          <IconPlus size={26} color="#0B0D10" />
        </button>
      )}

      {showAddExpense && (
        <div style={styles.modalOverlay} onClick={() => setShowAddExpense(false)}>
          <div style={styles.modalSheet} onClick={(ev) => ev.stopPropagation()}>
            <div style={styles.modalHeader}>
              <span style={styles.modalTitle}>新增支出</span>
              <button className="lg-press" style={styles.modalClose} onClick={() => setShowAddExpense(false)}>
                <IconX size={20} color="#9AA0A6" />
              </button>
            </div>

            <div style={styles.amountInputWrap}>
              <span style={styles.amountSymbol}>
                {CURRENCIES.find((c) => c.code === activeTrip.currency)?.symbol}
              </span>
              <input
                type="number"
                inputMode="decimal"
                placeholder="0"
                value={formAmount}
                onChange={(ev) => setFormAmount(ev.target.value)}
                style={styles.amountInput}
                autoFocus
              />
            </div>

            <div style={styles.formLabel}>分類</div>
            <div style={styles.categoryGrid}>
              {CATEGORIES.map((c) => {
                const Icon = c.icon;
                const active = formCategory === c.id;
                return (
                  <button
                    key={c.id}
                    className="lg-press"
                    onClick={() => setFormCategory(c.id)}
                    style={{
                      ...styles.categoryPick,
                      borderColor: active ? c.color : "#2A2E33",
                      backgroundColor: active ? c.color + "1A" : "#181B1F",
                    }}
                  >
                    <Icon size={20} color={active ? c.color : "#9AA0A6"} />
                    <span style={{ ...styles.categoryPickLabel, color: active ? "#F5F1E8" : "#9AA0A6" }}>
                      {c.label}
                    </span>
                  </button>
                );
              })}
            </div>

            <div style={styles.formLabel}>備註（選填）</div>
            <input
              type="text"
              className="lg-input"
              placeholder="例如：午餐、伴手禮..."
              value={formNote}
              onChange={(ev) => setFormNote(ev.target.value)}
              style={styles.textInput}
            />

            <div style={styles.formLabel}>日期</div>
            <input
              type="date"
              className="lg-input"
              value={formDate}
              onChange={(ev) => setFormDate(ev.target.value)}
              style={styles.textInput}
            />

            <button
              className="lg-press"
              style={{ ...styles.saveBtn, opacity: parseFloat(formAmount) > 0 ? 1 : 0.4 }}
              onClick={addExpense}
              disabled={!(parseFloat(formAmount) > 0)}
            >
              儲存
            </button>
          </div>
        </div>
      )}

      {showAddTrip && (
        <div style={styles.modalOverlay} onClick={closeTripModal}>
          <div style={styles.modalSheet} onClick={(ev) => ev.stopPropagation()}>
            <div style={styles.modalHeader}>
              <span style={styles.modalTitle}>{editingTripId ? "編輯行程" : "新增行程"}</span>
              <button className="lg-press" style={styles.modalClose} onClick={closeTripModal}>
                <IconX size={20} color="#9AA0A6" />
              </button>
            </div>

            <div style={styles.formLabel}>行程名稱</div>
            <input
              type="text"
              className="lg-input"
              placeholder="例如：日本七日遊"
              value={newTripName}
              onChange={(ev) => setNewTripName(ev.target.value)}
              style={styles.textInput}
              autoFocus
            />

            <div style={styles.formLabel}>幣別</div>
            {editingTripId ? (
              <div style={styles.currencyReadonly}>
                {CURRENCIES.find((c) => c.code === newTripCurrency)?.symbol} {CURRENCIES.find((c) => c.code === newTripCurrency)?.label}（建立後無法更改）
              </div>
            ) : (
              <div style={styles.currencyRow}>
                {CURRENCIES.map((c) => {
                  const active = newTripCurrency === c.code;
                  return (
                    <button
                      key={c.code}
                      className="lg-press"
                      onClick={() => setNewTripCurrency(c.code)}
                      style={{
                        ...styles.currencyPick,
                        borderColor: active ? "#D4AF37" : "#2A2E33",
                        backgroundColor: active ? "#D4AF3722" : "#181B1F",
                        color: active ? "#F5F1E8" : "#9AA0A6",
                      }}
                    >
                      {c.symbol} {c.label}
                    </button>
                  );
                })}
              </div>
            )}

            <div style={styles.formLabel}>預算（選填）</div>
            <input
              type="number"
              inputMode="decimal"
              className="lg-input"
              placeholder="例如 5000"
              value={newTripBudget}
              onChange={(ev) => setNewTripBudget(ev.target.value)}
              style={styles.textInput}
            />

            {newTripCurrency !== "TWD" && (
              <>
                <div style={styles.formLabel}>{`匯率（選填，1 ${CURRENCIES.find((c) => c.code === newTripCurrency)?.symbol} ≈ 多少台幣）`}</div>
                <input
                  type="number"
                  step="0.0001"
                  inputMode="decimal"
                  className="lg-input"
                  placeholder="例如 0.21"
                  value={newTripExchangeRate}
                  onChange={(ev) => setNewTripExchangeRate(ev.target.value)}
                  style={styles.textInput}
                />
              </>
            )}

            <button
              className="lg-press"
              style={{ ...styles.saveBtn, opacity: newTripName.trim() ? 1 : 0.4 }}
              onClick={saveTrip}
              disabled={!newTripName.trim()}
            >
              {editingTripId ? "儲存變更" : "建立行程"}
            </button>
          </div>
        </div>
      )}

      {showSearch && (
        <div style={styles.modalOverlay} onClick={() => setShowSearch(false)}>
          <div style={{ ...styles.modalSheet, maxHeight: "92vh" }} onClick={(ev) => ev.stopPropagation()}>
            <div style={styles.modalHeader}>
              <span style={styles.modalTitle}>搜尋支出</span>
              <button className="lg-press" style={styles.modalClose} onClick={() => setShowSearch(false)}>
                <IconX size={20} color="#9AA0A6" />
              </button>
            </div>

            <div style={styles.searchInputWrap}>
              <IconSearch size={18} color="#6B7076" />
              <input
                type="text"
                className="lg-input"
                placeholder="搜尋備註或分類..."
                value={searchQuery}
                onChange={(ev) => setSearchQuery(ev.target.value)}
                style={styles.searchInput}
                autoFocus
              />
            </div>

            <div style={styles.formLabel}>時間範圍</div>
            <div style={styles.presetRow}>
              {[
                { id: "all", label: "全部時間" },
                { id: "today", label: "今天" },
                { id: "week", label: "本週" },
                { id: "month", label: "本月" },
                { id: "custom", label: "自訂" },
              ].map((p) => (
                <button
                  key={p.id}
                  className="lg-press"
                  onClick={() => applyPreset(p.id)}
                  style={{
                    ...styles.presetBtn,
                    borderColor: searchPreset === p.id ? "#D4AF37" : "#2A2E33",
                    backgroundColor: searchPreset === p.id ? "#D4AF3722" : "#181B1F",
                    color: searchPreset === p.id ? "#F5F1E8" : "#9AA0A6",
                  }}
                >
                  {p.label}
                </button>
              ))}
            </div>

            {searchPreset === "custom" && (
              <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
                <input
                  type="date"
                  className="lg-input"
                  value={searchDateFrom}
                  onChange={(ev) => setSearchDateFrom(ev.target.value)}
                  style={{ ...styles.textInput, marginBottom: 0, flex: 1 }}
                />
                <input
                  type="date"
                  className="lg-input"
                  value={searchDateTo}
                  onChange={(ev) => setSearchDateTo(ev.target.value)}
                  style={{ ...styles.textInput, marginBottom: 0, flex: 1 }}
                />
              </div>
            )}

            {data.trips.length > 1 && (
              <>
                <div style={styles.formLabel}>搜尋範圍</div>
                <div style={styles.currencyRow}>
                  {[
                    { id: "current", label: `僅「${activeTrip.name}」` },
                    { id: "all", label: "所有行程" },
                  ].map((s) => (
                    <button
                      key={s.id}
                      className="lg-press"
                      onClick={() => setSearchScope(s.id)}
                      style={{
                        ...styles.currencyPick,
                        borderColor: searchScope === s.id ? "#D4AF37" : "#2A2E33",
                        backgroundColor: searchScope === s.id ? "#D4AF3722" : "#181B1F",
                        color: searchScope === s.id ? "#F5F1E8" : "#9AA0A6",
                      }}
                    >
                      {s.label}
                    </button>
                  ))}
                </div>
              </>
            )}

            <div style={styles.formLabel}>分類</div>
            <div style={styles.chipRow}>
              {CATEGORIES.map((c) => {
                const Icon = c.icon;
                const active = searchCategories.has(c.id);
                return (
                  <button
                    key={c.id}
                    className="lg-press"
                    onClick={() => toggleSearchCategory(c.id)}
                    style={{
                      ...styles.chip,
                      borderColor: active ? c.color : "#2A2E33",
                      backgroundColor: active ? c.color + "1A" : "#181B1F",
                      color: active ? "#F5F1E8" : "#9AA0A6",
                    }}
                  >
                    <Icon size={14} color={active ? c.color : "#9AA0A6"} />
                    {c.label}
                  </button>
                );
              })}
            </div>

            <div style={styles.searchResultsHeader}>
              <span style={styles.resultsCount}>{resultsSummaryText || "沒有符合的紀錄"}</span>
              <button className="lg-press" style={styles.clearFiltersBtn} onClick={clearSearchFilters}>清除篩選</button>
            </div>

            <div style={{ marginTop: 4 }}>
              {searchDateKeys.length === 0 && (
                <div style={styles.emptyState}>
                  <IconSearch size={26} color="#4A4F55" />
                  <div style={styles.emptyText}>找不到符合條件的紀錄</div>
                  <div style={styles.emptySub}>試試調整關鍵字或時間範圍</div>
                </div>
              )}
              {searchDateKeys.map((dateKey) => {
                const dayExpenses = searchGroupMap[dateKey];
                return (
                  <div key={dateKey} style={{ marginBottom: 16 }}>
                    <div style={styles.dateHeader}>
                      <span>{formatDateLabel(dateKey)}</span>
                    </div>
                    {dayExpenses.map((e) =>
                      renderExpenseRow(e, {
                        currency: tripCurrencyMap[e.tripId],
                        tripName: searchScope === "all" ? tripNameMap[e.tripId] : undefined,
                      })
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
