  };
  var fillIcons = { more: true };

}

/* ---------- helpers ---------- */
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function todayLocal() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function findCategory(id) {
  for (var i = 0; i < CATEGORIES.length; i++) { if (CATEGORIES[i].id === id) return CATEGORIES[i]; }
  return CATEGORIES[CATEGORIES.length - 1];
}
function findCurrency(code) {
  for (var i = 0; i < CURRENCIES.length; i++) { if (CURRENCIES[i].code === code) return CURRENCIES[i]; }
  return CURRENCIES[0];
}
function formatMoney(amount, code) {
  var n = Number(amount) || 0;
  var symbol = findCurrency(code).symbol;
  var decimals = code === 'USD' ? 2 : 0;
  var formatted = n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  return symbol + formatted;
}
function formatDateLabel(dateStr) {
  var parts = dateStr.split('-').map(Number);
  var dt = new Date(parts[0], parts[1] - 1, parts[2]);
  return parts[1] + '/' + parts[2] + ' ' + WEEKDAYS[dt.getDay()];
}
function groupExpensesByDate(expenses) {
  var map = {};
  expenses.forEach(function (e) {
    if (!map[e.date]) map[e.date] = [];
    map[e.date].push(e);
  });
  var keys = Object.keys(map).sort(function (a, b) { return a < b ? 1 : -1; });
  keys.forEach(function (k) { map[k].sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); }); });
  return { map: map, keys: keys };
}
function getRangeForPreset(preset) {
  var today = todayLocal();
  if (preset === 'today') return { from: today, to: today };
  if (preset === 'week') {
    var d = new Date();
    var day = d.getDay();
    var diffToMonday = day === 0 ? 6 : day - 1;
    var monday = new Date(d);
    monday.setDate(d.getDate() - diffToMonday);
    var from = monday.getFullYear() + '-' + String(monday.getMonth() + 1).padStart(2, '0') + '-' + String(monday.getDate()).padStart(2, '0');
    return { from: from, to: today };
  }
  if (preset === 'month') {
    var d2 = new Date();
    var from2 = d2.getFullYear() + '-' + String(d2.getMonth() + 1).padStart(2, '0') + '-01';
    return { from: from2, to: today };
  }
  return { from: '', to: '' };
}
/* Manual month arithmetic on 'YYYY-MM' strings — avoids new Date('YYYY-MM') which Safari parses inconsistently */
function shiftMonth(monthStr, delta) {
  var parts = monthStr.split('-').map(Number);
  var y = parts[0], m = parts[1] + delta;
  while (m > 12) { m -= 12; y += 1; }
  while (m < 1) { m += 12; y -= 1; }
  return y + '-' + String(m).padStart(2, '0');
}
function getUserName() {
  try { return localStorage.getItem(USERNAME_KEY) || ''; } catch (e) { return ''; }
}
function setUserNameStored(name) {
  try { localStorage.setItem(USERNAME_KEY, name); } catch (e) {}
}

/* ---------- Firestore sync ---------- */
function ensureDailyLedger() {
  db.collection('trips').doc(DAILY_ID).get().then(function (snap) {
    if (!snap.exists) {
      db.collection('trips').doc(DAILY_ID).set({
        type: 'daily', name: '日常支出', currency: 'TWD', archived: false, monthlyBudget: 0, createdAt: Date.now()
      });
    }
  });
}
function startSync() {
  if (!firebaseReady) {
    var root = document.getElementById('app');
    root.innerHTML = '<div class="loading-wrap">' + icon('alert', 32, '#E5484D') +
      '<div style="margin-top:14px;color:#F5F1E8;font-size:16px;font-weight:700;">還沒接上 Firebase</div>' +
      '<div style="margin-top:8px;color:#9AA0A6;font-size:14px;max-width:280px;">請把檔案裡的 firebaseConfig 換成你自己 Firebase 專案的設定</div></div>';
    document.getElementById('fab').classList.add('hidden');
    return;
  }
  appData = { trips: [], expenses: [] };
  ensureDailyLedger();

  unsubTrips = db.collection('trips').orderBy('createdAt').onSnapshot(function (snap) {
    appData.trips = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
    if (!activeTripId || !appData.trips.some(function (t) { return t.id === activeTripId; })) {
      var daily = appData.trips.filter(function (t) { return t.id === DAILY_ID; })[0];
      activeTripId = daily ? daily.id : (appData.trips[0] ? appData.trips[0].id : null);
    }
    saveErrorFlag = false;
    renderApp();
  }, function () { saveErrorFlag = true; renderApp(); });

  unsubExpenses = db.collection('expenses').onSnapshot(function (snap) {
    appData.expenses = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
    renderApp();
  }, function () { saveErrorFlag = true; renderApp(); });

  unsubTemplates = db.collection('recurringTemplates').orderBy('createdAt').onSnapshot(function (snap) {
    templatesCache = snap.docs.map(function (d) { return Object.assign({ id: d.id }, d.data()); });
    renderApp();
    if (modalOpen === 'trip' && editingTripId === DAILY_ID) {
      var box = document.getElementById('templateListBox');
      if (box) box.innerHTML = renderTemplateList();
    }
  }, function () {});
}

function doSaveTrip() {
  if (editingTripId === DAILY_ID) {
    var dname = document.getElementById('tripNameInput').value.trim() || '日常支出';
    var mb = parseFloat(document.getElementById('tripMonthlyBudgetInput').value) || 0;
    closeModal();
    db.collection('trips').doc(DAILY_ID).update({ name: dname, monthlyBudget: mb })
      .catch(function () { saveErrorFlag = true; renderApp(); });
    return;
  }
  var name = document.getElementById('tripNameInput').value.trim();
  if (!name) return;
  var budget = parseFloat(document.getElementById('tripBudgetInput').value) || 0;
  var rateInput = document.getElementById('tripExchangeInput');
  var rate = rateInput ? (parseFloat(rateInput.value) || 0) : 0;
  closeModal();
  if (editingTripId) {
    db.collection('trips').doc(editingTripId).update({ name: name, budget: budget, exchangeRate: rate })
      .catch(function () { saveErrorFlag = true; renderApp(); });
  } else {
    db.collection('trips').add({ type: 'trip', name: name, currency: currentNewTripCurrency, budget: budget, exchangeRate: rate, archived: false, createdAt: Date.now() })
      .then(function (ref) { activeTripId = ref.id; renderApp(); })
      .catch(function () { saveErrorFlag = true; renderApp(); });
  }
}
function doArchiveTrip() {
  if (!editingTripId || editingTripId === DAILY_ID) return;
  var tid = editingTripId;
  closeModal();
  db.collection('trips').doc(tid).update({ archived: true }).then(function () {
    if (activeTripId === tid) { activeTripId = DAILY_ID; renderApp(); }
  }).catch(function () { saveErrorFlag = true; renderApp(); });
}
function doRestoreTrip(tid) {
  db.collection('trips').doc(tid).update({ archived: false }).catch(function () { saveErrorFlag = true; renderApp(); });
}
function doDeleteTrip() {
  var activeTrip = getActiveTrip();
  if (!activeTrip || activeTrip.id === DAILY_ID) return;
  var tid = activeTrip.id;
  var expenseIds = appData.expenses.filter(function (e) { return e.tripId === tid; }).map(function (e) { return e.id; });
  var CHUNK = 400;
  var chunks = [];
  for (var i = 0; i < expenseIds.length; i += CHUNK) chunks.push(expenseIds.slice(i, i + CHUNK));
  if (chunks.length === 0) chunks.push([]);
  var promises = chunks.map(function (ids, idx) {
    var batch = db.batch();
    if (idx === 0) batch.delete(db.collection('trips').doc(tid));
    ids.forEach(function (id) { batch.delete(db.collection('expenses').doc(id)); });
    return batch.commit();
  });
  confirmDeleteTripFlag = false;
  if (activeTripId === tid) activeTripId = DAILY_ID;
  Promise.all(promises).catch(function () { saveErrorFlag = true; renderApp(); });
}
function doDeleteExpense(id) {
  confirmDeleteExpenseId = null;
  db.collection('expenses').doc(id).delete().catch(function () { saveErrorFlag = true; renderApp(); });
  if (modalOpen === 'search') renderSearchResults(); else renderApp();
}

function syncPresetButtons() {

function applyPreset(preset) {
  searchState.preset = preset;
  if (preset === 'all') { searchState.dateFrom = ''; searchState.dateTo = ''; }
  else if (preset !== 'custom') {
    var r = getRangeForPreset(preset);
    searchState.dateFrom = r.from; searchState.dateTo = r.to;
  }
  syncPresetButtons();
  document.getElementById('customDateRow').classList.toggle('hidden', preset !== 'custom');
  document.getElementById('searchDateFrom').value = searchState.dateFrom;
  document.getElementById('searchDateTo').value = searchState.dateTo;
  renderSearchResults();
}
function renderSearchResults() {
  var activeTrip = getActiveTrip();
  var pool = searchState.scope === 'all' ? appData.expenses : appData.expenses.filter(function (e) { return e.tripId === activeTrip.id; });
  var q = searchState.query.trim().toLowerCase();
  var results = pool.filter(function (e) {
    var catIds = Object.keys(searchState.categories).filter(function (k) { return searchState.categories[k]; });
    if (catIds.length > 0 && !searchState.categories[e.category]) return false;
    var payIds = Object.keys(searchState.payMethods).filter(function (k) { return searchState.payMethods[k]; });
    if (payIds.length > 0 && !searchState.payMethods[e.payMethod || 'cash']) return false;
    if (searchState.dateFrom && e.date < searchState.dateFrom) return false;
    if (searchState.dateTo && e.date > searchState.dateTo) return false;
    if (q) {
      var cat = findCategory(e.category);
      var hay = (e.note + ' ' + cat.label).toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  var grouped = groupExpensesByDate(results);
  var countEl = document.getElementById('resultsCount');
  if (results.length === 0) {
    countEl.textContent = '沒有符合的紀錄';
  } else if (searchState.scope === 'current') {
    var sum = results.reduce(function (s, e) { return s + Number(e.amount); }, 0);
    countEl.textContent = results.length + ' 筆・' + formatMoney(sum, activeTrip.currency);
  } else {
    countEl.textContent = results.length + ' 筆';
  }
  var tripCurrencyMap = {}, tripNameMap = {};
  appData.trips.forEach(function (t) { tripCurrencyMap[t.id] = t.currency; tripNameMap[t.id] = t.name; });

  var box = document.getElementById('searchResultsBox');
  if (grouped.keys.length === 0) {
    box.innerHTML = '<div class="empty-state">' + icon('search', 26, '#4A4F55') + '<div class="empty-text">找不到符合條件的紀錄</div><div class="empty-sub">試試調整關鍵字或時間範圍</div></div>';
    return;
  }
  var html = '';
  grouped.keys.forEach(function (dateKey) {
    html += '<div style="margin-bottom:16px;"><div class="date-header"><span>' + formatDateLabel(dateKey) + '</span></div>';
    grouped.map[dateKey].forEach(function (e) {
      html += renderExpenseRow(e, tripCurrencyMap[e.tripId], { tripName: searchState.scope === 'all' ? tripNameMap[e.tripId] : undefined });
    });
    html += '</div>';
  });
  box.innerHTML = html;
}

/* ---------- share summary ---------- */
function buildSummaryText() {
  var activeTrip = getActiveTrip();
  var isDaily = activeTrip.id === DAILY_ID;
  var allTripExpenses = appData.expenses.filter(function (e) { return e.tripId === activeTrip.id; });
  var tripExpenses = isDaily ? allTripExpenses.filter(function (e) { return e.date.slice(0, 7) === currentMonth; }) : allTripExpenses;
  var total = tripExpenses.reduce(function (s, e) { return s + Number(e.amount); }, 0);
  var budget = isDaily ? (activeTrip.monthlyBudget || 0) : (activeTrip.budget || 0);
  var hasBudget = budget > 0;
  var exchangeRate = activeTrip.exchangeRate || 0;
  var showConversion = !isDaily && activeTrip.currency !== 'TWD' && exchangeRate > 0;
  var categoryTotals = CATEGORIES.map(function (c) {
    var t = tripExpenses.filter(function (e) { return e.category === c.id; }).reduce(function (s, e) { return s + Number(e.amount); }, 0);
    return { label: c.label, total: t };
  }).filter(function (c) { return c.total > 0; }).sort(function (a, b) { return b.total - a.total; });
  var grouped = groupExpensesByDate(tripExpenses);

  var lines = [];
  lines.push(activeTrip.name + (isDaily ? ' (' + currentMonth.replace('-', '/') + ') 支出總結' : ' 支出總結'));
  lines.push('總額：' + formatMoney(total, activeTrip.currency) + (hasBudget ? '／預算 ' + formatMoney(budget, activeTrip.currency) : ''));
  if (showConversion) lines.push('約合台幣：' + formatMoney(total * exchangeRate, 'TWD'));
  if (categoryTotals.length > 0) {
    lines.push('——');
    categoryTotals.forEach(function (c) {
      var pct = total > 0 ? Math.round((c.total / total) * 100) : 0;
      lines.push(c.label + '：' + formatMoney(c.total, activeTrip.currency) + '（' + pct + '%）');
    });
  }
  if (grouped.keys.length > 0) {
    lines.push('——');
    grouped.keys.slice().reverse().forEach(function (d) {
      var sum = grouped.map[d].reduce(function (s, e) { return s + Number(e.amount); }, 0);
      lines.push(formatDateLabel(d) + '：' + formatMoney(sum, activeTrip.currency));
    });
  }
  return lines.join('\n');
}
function doShareSummary() {
  var text = buildSummaryText();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function () { showToast('ok'); }).catch(function () { showToast('error'); });
  } else {
    showToast('error');
  }
}
var toastTimer = null;
function showToast(kind) {
  var el = document.getElementById('toast');
  el.textContent = kind === 'error' ? '複製失敗，請手動複製' : '已複製到剪貼簿 ✓';
  el.classList.remove('hidden');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { el.classList.add('hidden'); }, 2000);
}

/* ---------- modal close ---------- */
function closeModal() {
  document.getElementById('modalRoot').innerHTML = '';
  modalOpen = null;
  editingExpenseId = null;
  currentTemplateId = null;
}

/* ---------- global click delegation ---------- */
function handleGlobalClick(ev) {
  var el = ev.target.closest ? ev.target.closest('[data-action]') : null;
  if (!el) return;
  var action = el.getAttribute('data-action');

  if (action === 'select-trip') {
    activeTripId = el.getAttribute('data-trip-id');
    confirmDeleteTripFlag = false; confirmDeleteExpenseId = null;
    renderApp();
  } else if (action === 'shift-month') {
    currentMonth = shiftMonth(currentMonth, parseInt(el.getAttribute('data-delta'), 10));
    renderApp();
  } else if (action === 'quick-bill') {
    var tid0 = el.getAttribute('data-template-id');
    var tmpl = templatesCache.filter(function (t) { return t.id === tid0; })[0];
    if (tmpl) openExpenseModal({ template: tmpl });
  } else if (action === 'edit-expense') {
    var eid2 = el.getAttribute('data-expense-id');
    var exp = appData.expenses.filter(function (x) { return x.id === eid2; })[0];
    if (exp) openExpenseModal({ editExpense: exp });
  } else if (action === 'search-this-trip') {
    openSearchModal(activeTripId);
  } else if (action === 'open-search') {
    openSearchModal();
  } else if (action === 'open-add-trip') {
    openTripModal(null);
  } else if (action === 'open-edit-trip') {
    openTripModal(el.getAttribute('data-trip-id'));
  } else if (action === 'open-archive-sheet') {
    openArchiveSheet();
  } else if (action === 'view-archived-trip') {
    activeTripId = el.getAttribute('data-trip-id');
    closeModal();
    renderApp();
  } else if (action === 'archive-trip') {
    doArchiveTrip();
  } else if (action === 'quick-archive-trip') {
    var qat = el.getAttribute('data-trip-id');
    if (qat && qat !== DAILY_ID) {
      db.collection('trips').doc(qat).update({ archived: true }).then(function () {
        if (activeTripId === qat) { activeTripId = DAILY_ID; renderApp(); }
      }).catch(function () { saveErrorFlag = true; renderApp(); });
    }
  } else if (action === 'restore-trip') {
    doRestoreTrip(el.getAttribute('data-trip-id'));
  } else if (action === 'ask-delete-trip') {
    confirmDeleteTripFlag = true; renderApp();
  } else if (action === 'cancel-delete-trip') {
    confirmDeleteTripFlag = false; renderApp();
  } else if (action === 'confirm-delete-trip') {
    doDeleteTrip();
  } else if (action === 'share-summary') {
    doShareSummary();
  } else if (action === 'ask-delete-expense') {
    confirmDeleteExpenseId = el.getAttribute('data-expense-id');
    if (modalOpen === 'search') renderSearchResults(); else renderApp();
  } else if (action === 'cancel-delete-expense') {
    confirmDeleteExpenseId = null;
    if (modalOpen === 'search') renderSearchResults(); else renderApp();
  } else if (action === 'confirm-delete-expense') {
    doDeleteExpense(el.getAttribute('data-expense-id'));
  } else if (action === 'open-add-expense') {
    openExpenseModal();
  } else if (action === 'pick-expense-ledger') {
    currentExpenseTargetId = el.getAttribute('data-ledger-id');
    document.querySelectorAll('#expenseLedgerRow .chip').forEach(function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-ledger-id') === currentExpenseTargetId);
    });
    var targetTrip = appData.trips.filter(function (t) { return t.id === currentExpenseTargetId; })[0];
    if (targetTrip) document.getElementById('expenseAmountSymbol').textContent = findCurrency(targetTrip.currency).symbol;
  } else if (action === 'open-username') {
    openUsernameModal(false);
  } else if (action === 'save-username') {
    doSaveUsername();
  } else if (action === 'close-modal') {
    closeModal();
  } else if (action === 'pick-expense-category') {
    currentExpenseCategory = el.getAttribute('data-cat');
    refreshExpenseCategoryGrid();
  } else if (action === 'pick-pay-method') {
    currentPayMethod = el.getAttribute('data-pay');
    document.querySelectorAll('#payMethodRow .currency-pick').forEach(function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-pay') === currentPayMethod);
    });
  } else if (action === 'save-expense') {
    doSaveExpense();
  } else if (action === 'pick-trip-currency') {
    currentNewTripCurrency = el.getAttribute('data-code');
    document.querySelectorAll('#tripCurrencyRow .currency-pick').forEach(function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-code') === currentNewTripCurrency);
    });
    var wrap = document.getElementById('tripExchangeWrap');
    if (currentNewTripCurrency === 'TWD') { wrap.classList.add('hidden'); }
    else { wrap.classList.remove('hidden'); document.getElementById('tripExchangeLabel').textContent = exchangeLabelText(currentNewTripCurrency); }
  } else if (action === 'save-trip') {
    doSaveTrip();
  } else if (action === 'add-template') {
    var tname = document.getElementById('newTemplateName').value.trim();
    if (!tname) return;
    var tamount = parseFloat(document.getElementById('newTemplateAmount').value) || 0;
    var tday = parseInt(document.getElementById('newTemplateDay').value, 10) || 0;
    db.collection('recurringTemplates').add({ name: tname, amount: tamount, category: 'bill', dayOfMonth: tday, createdAt: Date.now() });
    document.getElementById('newTemplateName').value = '';
    document.getElementById('newTemplateAmount').value = '';
    document.getElementById('newTemplateDay').value = '';
  } else if (action === 'delete-template') {
    db.collection('recurringTemplates').doc(el.getAttribute('data-template-id')).delete();
  } else if (action === 'pick-preset') {
    applyPreset(el.getAttribute('data-preset'));
  } else if (action === 'pick-scope') {
    searchState.scope = el.getAttribute('data-scope');
    document.querySelectorAll('#scopeRow .currency-pick').forEach(function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-scope') === searchState.scope);
    });
    renderSearchResults();
  } else if (action === 'toggle-search-cat') {
    var cid = el.getAttribute('data-cat');
    searchState.categories[cid] = !searchState.categories[cid];
    el.classList.toggle('active', !!searchState.categories[cid]);
    renderSearchResults();
  } else if (action === 'toggle-search-pay') {
    var pid = el.getAttribute('data-pay');
    searchState.payMethods[pid] = !searchState.payMethods[pid];
    el.classList.toggle('active', !!searchState.payMethods[pid]);
    renderSearchResults();
  } else if (action === 'clear-search-filters') {
    searchState = { query: '', preset: 'all', dateFrom: '', dateTo: '', scope: 'current', categories: {}, payMethods: {} };
    document.getElementById('searchQueryInput').value = '';
    document.getElementById('searchDateFrom').value = '';
    document.getElementById('searchDateTo').value = '';
    document.getElementById('customDateRow').classList.add('hidden');
    syncPresetButtons();
    var scopeRow = document.getElementById('scopeRow');
    if (scopeRow) scopeRow.querySelectorAll('.currency-pick').forEach(function (btn, i) { btn.classList.toggle('active', i === 0); });
    document.querySelectorAll('#searchChipRow .chip').forEach(function (btn) { btn.classList.remove('active'); });
    document.querySelectorAll('#searchPayRow .chip').forEach(function (btn) { btn.classList.remove('active'); });
    renderSearchResults();
  }
}

/* ---------- init ---------- */
function init() {
  document.addEventListener('click', handleGlobalClick);
  document.getElementById('modalRoot').addEventListener('click', function (ev) {
    if (nameGateActive) return;
    if (ev.target.classList.contains('modal-overlay')) closeModal();
  });
  renderApp();
  if (!getUserName()) {
    openUsernameModal(true);
  } else {
    startSync();
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
